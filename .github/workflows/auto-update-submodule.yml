name: 自动更新子模块

on:
  schedule:
    - cron: '0 9 * * 1'  # 每周一 9:00
  workflow_dispatch:      # 手动触发

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出主仓库代码（含子模块）
      - name: 检出代码
        uses: actions/checkout@v6   # 升级到 v6，消除 Node 警告
        with:
          submodules: true          # 先拉取当前锁定的版本
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 修复协议并强制拉取最新代码（核心修复）
      - name: 更新子模块到最新
        run: |
          # 关键修复：将 SSH 协议全局替换为 HTTPS，解决 runner 无 SSH 密钥的问题
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          
          # 进入子模块目录
          cd ./ElaWidgetTools
          
          # 获取远程最新信息
          git fetch origin
          
          # 智能切换到远程的默认分支（自动适配 main 或 master）
          DEFAULT_BRANCH=$(git remote show origin | grep 'HEAD branch' | cut -d' ' -f5)
          git checkout $DEFAULT_BRANCH
          
          # 拉取最新代码
          git pull origin $DEFAULT_BRANCH
          
          # 返回主仓库根目录
          cd ..
          
          # 将更新后的子模块指针添加到暂存区
          git add ./ElaWidgetTools

      # 3. 创建 Pull Request（升级到 v8）
      - name: 创建 Pull Request
        uses: peter-evans/create-pull-request@v8   # 升级到 v8，消除 Node 警告
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: 自动更新 ElaWidgetTools 子模块"
          title: "自动更新子模块 ElaWidgetTools"
          body: |
            此 PR 由自动化工作流生成，用于将子模块 `ElaWidgetTools` 更新到最新版本。
            
            ✅ 已自动适配主分支 (main/master)
          branch: "auto-update-submodule"
          base: "main"          # 如果主分支是 master，请改为 master
          delete-branch: true
