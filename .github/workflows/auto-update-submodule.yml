name: 自动更新子模块

on:
  schedule:
    - cron: '0 9 * * 1'   # 每周一 9:00
  workflow_dispatch:       # 手动触发

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    # ---------- 关键：显式声明权限 ----------
    permissions:
      contents: write      # 允许推送分支
      pull-requests: write # 允许创建 PR

    steps:
      # 1. 检出主仓库（包含子模块）
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 更新子模块到最新（使用 HTTPS 协议绕过 SSH）
      - name: 更新子模块到最新
        run: |
          # 强制使用 HTTPS 代替 SSH（子模块公开，不需要 SSH）
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          
          cd ./ElaWidgetTools
          git fetch origin
          # 自动探测子模块的默认分支（main 或 master）
          DEFAULT_BRANCH=$(git remote show origin | grep 'HEAD branch' | cut -d' ' -f5)
          git checkout $DEFAULT_BRANCH
          git pull origin $DEFAULT_BRANCH
          cd ..
          
          # 将新的子模块指针加入暂存区
          git add ./ElaWidgetTools

      # 3. 创建 Pull Request（基于更新后的子模块指针）
      - name: 创建 Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: 自动更新 ElaWidgetTools 子模块"
          title: "自动更新子模块 ElaWidgetTools"
          body: |
            此 PR 由自动化工作流生成，用于将子模块 `ElaWidgetTools` 更新到最新版本。
            
            ✅ 已自动适配主分支 (main/master)
          branch: "auto-update-submodule"
          base: "main"          # 若你的主分支是 master，改成 master
          delete-branch: true
